<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="card shadow-lg p-5" style="max-width: 500px; width:100%">
        <h1 class="card-title text-primary text-center mb-4">
            <i class="fa fa-check"></i>
            To-Do List
        </h1>

        <div class="mb-3">
            <label for="addTask" class="form-label fw-bold">
                Add a new task
            </label>
            <input id="addTask" class="form-control form-control-lg" type="text" placeholder="Write your task here..."
                aria-describedby="addTaskError" required />
            <span id="addTaskError" class="invalid-feedback">
                Please enter a task!
            </span>
        </div>

        <div class="d-grid gap-2 d-md-flex">
            <button type="button" class="btn btn-primary flex-fill" onclick="addTask()" aria-label="Add a new task">
                Add Task
            </button>
            <button type="button" class="btn btn-success flex-fill" onclick="saveTask()"
                aria-label="Save tasks locally">
                Save
            </button>
            <button type="button" class="btn btn-danger flex-fill" onclick="clearTask()" aria-label="Clear all tasks">
                Clear
            </button>
        </div>

        <div id="taskList" class="mt-4" style="display: none;">
            <h5 class="border-bottom pb-2 mb-3">Your tasks:</h5>
            <div id="taskContainer"></div>
            <div id="completedList" style="display: none;">
                <h5 class="border-bottom pb-2 mb-3 mt-4">Completed tasks:</h5>
                <div id="completedContainer"></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>

</html>
